title: Engineering Portfolio
email: your-email@example.com
description: >-
  A professional engineering portfolio showcasing projects, problem-solving, and system design.
url: "https://mackaygunn.github.io"
baseurl: ""

# Build settings
markdown: kramdown
future: true
theme: null # We are using a custom theme

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - templates/
