---
layout: default
---
<article class="project-detail">
  <div style="margin-bottom: 2rem;">
    <a href="{{ '/' | relative_url }}" style="display: inline-flex; align-items: center; padding: 8px 16px; background-color: #f4f4f4; color: #333; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 0.9rem; transition: background 0.2s;">
      <span style="margin-right: 8px;">&larr;</span> Back to Home
    </a>
  </div>
  <header class="project-header">
    <h1 class="project-title">{{ page.title | escape }}</h1>
    <div class="project-meta">
      {% if page.duration %}
        <span class="project-duration">{{ page.duration | escape }}</span>
      {% else %}
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% endif %}
    </div>
    {% if page.tags %}
    <div class="project-tags">
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="project-content">
    {{ content }}
  </div>
</article>
