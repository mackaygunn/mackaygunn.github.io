<style>
.contact-page-wrapper {
  padding: 4rem 0 6rem 0;
  min-height: 80vh;
}
.contact-main-title {
  text-align: center;
  font-size: 2.8rem;
  font-weight: 700;
  margin-bottom: 3rem;
  color: var(--text-color);
}
.contact-main-title::after {
  content: "";
  display: block;
  width: 40px;
  height: 4px;
  background: var(--accent-orange, #f97316);
  margin: 15px auto 0;
  border-radius: 2px;
}
.contact-container {
  display: flex;
  background: #1f2937;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
  max-width: 1000px;
  margin: 0 auto;
}
@media (max-width: 768px) {
  .contact-container {
    flex-direction: column;
  }
}
.contact-info-panel {
  flex: 1;
  background: linear-gradient(145deg, #0f172a, #1e1b4b);
  padding: 3rem;
  color: #fff;
  display: flex;
  flex-direction: column;
}
.contact-info-panel h2 {
  font-size: 1.8rem;
  margin-bottom: 1rem;
  font-weight: 600;
  color: #fff;
}
.contact-desc {
  color: #94a3b8;
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 3rem;
}
.info-items {
  display: flex;
  flex-direction: column;
  gap: 2rem;
  margin-bottom: auto;
}
.info-item {
  display: flex;
  align-items: center;
  gap: 1.25rem;
}
.info-icon {
  width: 24px;
  height: 24px;
  stroke: #ea580c;
  flex-shrink: 0;
}
.info-text {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.info-text strong {
  font-size: 1.1rem;
  color: #fff;
}
.info-text span {
  color: #cbd5e1;
  font-size: 0.95rem;
}
.social-logos {
  display: flex;
  gap: 1.5rem;
  margin-top: 4rem;
}
.social-logos a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
  color: #fff;
  transition: background 0.2s, transform 0.2s;
}
.social-logos a:hover {
  background: #ea580c;
  transform: translateY(-3px);
}
.social-logos svg {
  width: 18px;
  height: 18px;
}

/* Right Form Panel */
.contact-form-panel {
  flex: 1.2;
  background: #1e2532;
  padding: 3rem;
}
.form-group {
  margin-bottom: 1.5rem;
}
.form-group label {
  display: block;
  font-size: 0.95rem;
  font-weight: 500;
  color: #e2e8f0;
  margin-bottom: 0.5rem;
}
.form-group input,
.form-group textarea {
  width: 100%;
  background: #2a3441;
  border: 1px solid #3b4252;
  border-radius: 8px;
  padding: 0.8rem 1rem;
  color: #fff;
  font-family: inherit;
  font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #60a5fa;
  box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
}
.form-group textarea {
  resize: vertical;
}
.btn-send {
  background: #7f1d1d;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.8rem 1.5rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: background 0.2s;
}
.btn-send:hover {
  background: #991b1b;
}
</style>
